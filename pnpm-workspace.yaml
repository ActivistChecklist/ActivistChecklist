allowBuilds:
  "@activistchecklist/umami-extra-privacy": true
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  sharp: true

onlyBuiltDependencies:
  - "@activistchecklist/umami-extra-privacy"
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - sharp

overrides:
  "@radix-ui/react-slot": "1.2.4"
  picomatch: ">=4.0.4"
  systeminformation: ">=5.31.0"
  brace-expansion: "^2.0.3"
  lodash: ">=4.18.0"
  markdown-it: ">=14.1.1"
  ajv: ">=8.18.0"
  rollup: ">=4.59.0"
  basic-ftp: ">=5.2.2"
  undici: ">=7.28.0"
  yauzl: ">=3.2.1"
  "ws@7": ">=7.5.11"
  "ws@8": ">=8.21.0"
  qs: ">=6.15.2"
  vite: ">=8.0.16"
  postcss: ">=8.5.17"
  esbuild: ">=0.28.1"
  "js-yaml@3": ">=3.15.0 <4"
  "js-yaml@4": ">=4.1.2 <5"

peerDependencyRules:
  # Packages that haven't declared React 19 support (or use malformed semver
  # like ">= ^19.x") but work in practice on the React 19 we're shipping.
  allowedVersions:
    react: "19"
    react-dom: "19"
    openseadragon: "6"
    tailwindcss: "4"

confirmModulesPurge: false

minimumReleaseAgeExclude:
  # First-party package — we publish it ourselves, so the release-age gate adds
  # no supply-chain protection and just blocks installing our own fresh releases.
  - '@activistchecklist/react-review-comments'
