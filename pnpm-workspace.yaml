allowBuilds:
  "@activistchecklist/umami-extra-privacy": true
  "@activistchecklist/umami-extra-privacy@https://codeload.github.com/ActivistChecklist/umami-extra-privacy/tar.gz/7669154d772ecbf3410c1243e8014ac8a0e74c5e": true
  "@parcel/watcher": true
  "@swc/core": true
  esbuild: true
  sharp: true

onlyBuiltDependencies:
  - "@activistchecklist/umami-extra-privacy"
  - "@parcel/watcher"
  - "@swc/core"
  - esbuild
  - sharp

overrides:
  "@radix-ui/react-slot": "1.2.4"
  picomatch: ">=4.0.4"
  systeminformation: ">=5.31.0"
  brace-expansion: "^2.0.3"
  lodash: ">=4.18.0"
  markdown-it: ">=14.1.1"
  ajv: ">=8.18.0"
  rollup: ">=4.59.0"
  basic-ftp: ">=5.2.2"
  undici: "^7.24.5"
  yauzl: ">=3.2.1"

peerDependencyRules:
  # Packages that haven't declared React 19 support (or use malformed semver
  # like ">= ^19.x") but work in practice on the React 19 we're shipping.
  allowedVersions:
    react: "19"
    react-dom: "19"
    openseadragon: "6"
    tailwindcss: "4"

confirmModulesPurge: false

minimumReleaseAgeExclude:
  # First-party package — we publish it ourselves, so the release-age gate adds
  # no supply-chain protection and just blocks installing our own fresh releases.
  - "@activistchecklist/react-review-comments"
