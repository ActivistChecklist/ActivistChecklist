name: Build and Deploy (via webhook)

on:
  push:
    branches:
      - main

# Optional: add repository secret HEALTHCHECKS_DEPLOY_PING_URL with your check's Ping URL
# (from Healthchecks.io, e.g. https://hc-ping.com/...). On success we GET that URL; on
# failure we POST to .../fail with the deploy step output (truncated to 100 kB).

jobs:
  trigger_build_and_deploy_webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger server deploy webhook
        id: deploy
        env:
          DEPLOY_URL: https://activistchecklist.org/webhooks/deploy.php
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          REPO_FULL_NAME: ${{ github.repository }}
          REF: ${{ github.ref }}
        run: |
          node - <<'NODE' 2>&1 | tee deploy-log.txt
          const crypto = require('crypto');
          const fs = require('fs');
          const os = require('os');
          const path = require('path');
          const { spawnSync } = require('child_process');

          const url = process.env.DEPLOY_URL;
          const secret = process.env.DEPLOY_SECRET;
          if (!secret) {
            console.error('Missing DEPLOY_SECRET');
            process.exit(1);
          }

          const payloadObj = {
            ref: process.env.REF,
            repository: { full_name: process.env.REPO_FULL_NAME }
          };
          const payload = JSON.stringify(payloadObj);
          const ts = Math.floor(Date.now() / 1000);
          const signed = `${ts}\n${payload}`;
          const sig = 'sha256=' + crypto.createHmac('sha256', secret).update(signed).digest('hex');

          const bodyFile = path.join(os.tmpdir(), `deploy-webhook-body-${process.pid}.txt`);
          // Do not use curl -f: we need the response body on 4xx/5xx (deploy.php explains the failure).
          const res = spawnSync(
            'curl',
            [
              '-sS',
              '-o',
              bodyFile,
              '-w',
              '%{http_code}',
              '-X',
              'POST',
              url,
              '-H',
              'Content-Type: application/json',
              '-H',
              `X-Deploy-Timestamp: ${ts}`,
              '-H',
              `X-Hub-Signature-256: ${sig}`,
              '--data-binary',
              payload
            ],
            { encoding: 'utf8' }
          );

          if (res.error) {
            console.error(res.error.message);
            process.exit(1);
          }
          if (res.status !== 0) {
            console.error('curl failed:', res.stderr || '(no stderr)');
            process.exit(res.status ?? 1);
          }

          const httpCode = String(res.stdout || '').trim();
          let body = '';
          try {
            body = fs.readFileSync(bodyFile, 'utf8');
          } catch (e) {
            body = '(could not read response body)';
          }
          try {
            fs.unlinkSync(bodyFile);
          } catch (_) {
            // ignore
          }

          console.log('--- Webhook HTTP status:', httpCode, '---');
          console.log(body);
          if (httpCode !== '200') {
            console.error(
              '\nDeploy webhook did not return 200. The message above is from the server (if any).\n' +
                'Host logs: .deploy-webhook.log is only written after auth passes and the deploy script runs.\n' +
                'On 403 Forbidden, compare GitHub secret DEPLOY_SECRET with server webhook-secrets (HMAC),\n' +
                'and allowed_repository with github.repository. Also check include/logs/deploy-webhook.error.log\n' +
                'and the PHP/Apache error log on the server.'
            );
            process.exit(1);
          }
          NODE

      - name: Notify Healthchecks.io
        if: always()
        continue-on-error: true
        env:
          HEALTHCHECKS_DEPLOY_PING_URL: ${{ secrets.HEALTHCHECKS_DEPLOY_PING_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$HEALTHCHECKS_DEPLOY_PING_URL" ]; then
            echo 'Skipping Healthchecks: HEALTHCHECKS_DEPLOY_PING_URL secret is not set.'
            exit 0
          fi

          BASE="${HEALTHCHECKS_DEPLOY_PING_URL%/}"

          if [ "$JOB_STATUS" = 'success' ]; then
            curl -fsS -m 30 --retry 3 "$BASE"
            echo 'Healthchecks: success ping sent.'
            exit 0
          fi

          # failure, cancelled, etc. — signal failure with logs (Healthchecks stores first 100 kB of body)
          (
            echo "job_status=${JOB_STATUS}"
            echo "run_url=${RUN_URL}"
            echo '--- deploy log ---'
            if [ -f deploy-log.txt ]; then
              cat deploy-log.txt
            else
              echo '(deploy-log.txt missing)'
            fi
          ) | head -c 100000 | curl -fsS -m 30 --retry 3 --data-binary @- "${BASE}/fail"

          echo 'Healthchecks: failure ping sent with log excerpt.'
