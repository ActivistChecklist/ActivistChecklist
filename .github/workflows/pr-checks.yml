# Full suite: tests + static build (link checks run inside buildstatic).
# Crowdin translation PRs (branch name l10n_*): only fast path checks — no test/build (saves CI and
# those PRs are almost entirely translated JSON/MDX from Crowdin).

name: Run Tests and Static Build (for PRs)

on:
  pull_request:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pr_checks:
    if: ${{ !startsWith(github.head_ref, 'l10n_') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ hashFiles('next.config.js', 'package.json', 'postcss.config.js', 'tailwind.config.js', 'app/**', 'components/**', 'lib/**', 'styles/**', 'content/**', 'messages/**') }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-

      - name: Yarn install
        run: yarn run install:ci

      - name: Unit tests
        run: yarn test

      - name: Internal paths (trailing slashes)
        run: yarn lint:paths

      - name: Static export build (production path)
        env:
          CHECKBUILD_URL_APPROVAL: allow
          BUILD_MODE: static
          NEXT_TELEMETRY_DISABLED: 1
        run: yarn buildstatic

  pr_checks_l10n:
    if: ${{ startsWith(github.head_ref, 'l10n_') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Yarn install
        run: yarn run install:ci

      - name: Internal paths (trailing slashes)
        run: yarn lint:paths
