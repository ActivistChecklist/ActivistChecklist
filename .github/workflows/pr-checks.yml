# Full suite: tests + static build (link checks run inside buildstatic).

name: Tests & Build (PRs)

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number ||
    github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect_changes:
    if: ${{ !startsWith(github.head_ref, 'l10n_') && !startsWith(github.ref_name, 'l10n_') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      runtime_changed: ${{ steps.filter.outputs.runtime }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # This is what WILL be included
      - name: Detect runtime-impacting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            runtime:
              - 'app/**'
              - 'api/**'
              - 'components/**'
              - 'contexts/**'
              - 'i18n/**'
              - 'hooks/**'
              - 'lib/**'
              - 'pages/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'next.config.*'
              - 'postcss.config.*'
              - 'tailwind.config.*'

  pr_quality:
    if: ${{ !startsWith(github.head_ref, 'l10n_') && !startsWith(github.ref_name, 'l10n_') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm run install:ci

      - name: Unit tests
        run: pnpm test

      - name: Internal paths (trailing slashes)
        run: pnpm lint:paths

  pr_build:
    if: ${{ !startsWith(github.head_ref, 'l10n_') && !startsWith(github.ref_name, 'l10n_') &&
      needs.detect_changes.outputs.runtime_changed == 'true' }}
    needs: detect_changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: next-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json',
            'next.config.js', 'postcss.config.js', 'tailwind.config.js') }}-${{
            github.ref_name }}
          restore-keys: |
            next-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'next.config.js', 'postcss.config.js', 'tailwind.config.js') }}-
            next-cache-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm run install:ci

      - name: Static export build (production path)
        env:
          BUILD_MODE: static
          NEXT_TELEMETRY_DISABLED: 1
        run: pnpm buildstatic
