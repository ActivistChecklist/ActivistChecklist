# One runner: optional delay, hide untranslatable strings, then AI pre-translate for files touched
# in this commit. See scripts/crowdin-hide-strings.mjs and scripts/crowdin-pre-translate.mjs.
#
# Crowdin’s GitHub integration pulls source changes from the repo continuously (not only on the
# hourly sync schedule). See https://support.crowdin.com/github-integration/
# A short fixed sleep runs before Crowdin API steps; optional extra minutes on manual dispatch.

name: Crowdin sync (main)

on:
  push:
    branches: [main]
    # Keep in sync with `files[].source` in crowdin.yml
    paths:
      - "content/en/**/*.mdx"
      - "messages/en.json"

  workflow_dispatch:
    inputs:
      delay_minutes:
        description: "Extra minutes after the fixed buffer (0 = buffer only)"
        default: "0"
        type: string
      head_sha:
        description: "Optional commit SHA (default — branch HEAD)"
        required: false
        type: string

concurrency:
  group: crowdin-main-sync
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  crowdin:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Wait before Crowdin API steps
        run: |
          BUFFER_SEC=45
          echo "Fixed buffer: ${BUFFER_SEC}s before Crowdin steps (import may lag the push slightly)."
          sleep "$BUFFER_SEC"
          EXTRA='${{ github.event.inputs.delay_minutes }}'
          if [ -n "$EXTRA" ] && [ "$EXTRA" != "0" ]; then
            echo "Additional wait: ${EXTRA} minute(s)."
            sleep "${EXTRA}m"
          fi

      # Temporarily off — set `if:` back to run on push/workflow_dispatch when re-enabling.
      - name: Hide untranslatable strings
        if: false
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
        run: node scripts/crowdin-hide-strings.mjs --apply

      - name: Collect Crowdin source paths from this commit
        id: paths
        run: |
          set -euo pipefail
          git show --name-only --pretty="" HEAD > /tmp/commit_files.txt
          grep -E '^(content/en/|messages/en\.json)' /tmp/commit_files.txt | sort -u > /tmp/crowdin_paths.txt || true
          count=$(wc -l < /tmp/crowdin_paths.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          {
            echo 'files<<EOF'
            cat /tmp/crowdin_paths.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Scoped pre-translate (Crowdin API)
        if: steps.paths.outputs.count != '0'
        env:
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_AI_PROMPT_ID: ${{ secrets.CROWDIN_AI_PROMPT_ID }}
          CROWDIN_TRANSLATE_UNTRANSLATED_ONLY: ${{ vars.CROWDIN_TRANSLATE_UNTRANSLATED_ONLY || 'false' }}
          CROWDIN_SKIP_APPROVED_TRANSLATIONS: ${{ vars.CROWDIN_SKIP_APPROVED_TRANSLATIONS || 'true' }}
          CROWDIN_EXCLUDE_LABEL_IDS: ${{ vars.CROWDIN_EXCLUDE_LABEL_IDS }}
          CHANGED_FILES: ${{ steps.paths.outputs.files }}
        run: node scripts/crowdin-pre-translate.mjs

      - name: Skip pre-translate (no matching source paths)
        if: steps.paths.outputs.count == '0'
        run: echo "No content/en/ or messages/en.json in this commit — skipping pre-translate."
